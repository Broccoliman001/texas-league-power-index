name: Update standings data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 10 * * *"

permissions:
  contents: write

jobs:
  update-standings:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          
      - name: Install dependencies
        run: pip install -r requirements.txt 
        
      - name: Run standings update script 
        run: python scripts/update_standings.py
        
      - name: Commit updated standings
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update standings data"
          file_pattern: data/standings.json
